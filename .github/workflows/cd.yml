name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only origin main

            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
              compose_kind="v2"
            elif command -v docker-compose >/dev/null 2>&1; then
              compose() { docker-compose "$@"; }
              compose_kind="v1"
            else
              echo "Docker Compose not found on server"
              exit 1
            fi

            compose version

            if [ "$compose_kind" = "v1" ]; then
              # docker-compose v1 can crash on recreate with stale containers.
              # Remove all containers for this service before `up`.
              docker ps -aq --filter "label=com.docker.compose.service=wb_best_parser" | xargs -r docker rm -f
              docker ps -aq --filter "name=wb_best_parser" | xargs -r docker rm -f
            fi

            compose up -d --build --remove-orphans
            compose ps